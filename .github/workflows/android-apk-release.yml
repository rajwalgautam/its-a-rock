# CI: run tests + typecheck on every push to main and on pull requests.
#
# Release (workflow_dispatch):
#   "v0.1.9"  →  every release gets a unix-time suffix, so the tag/release/app
#                version become "v0.1.9-<epoch>" and the Android versionCode is
#                that epoch. Releases are therefore unique and monotonic: just
#                dispatch the same base version again to re-release it — the app's
#                update check sees the newer build and installs it cleanly. The
#                changelog stays keyed to the base version (changelogs/v0.1.9.md).
#
# Unlike water-tracker (which publishes to a separate release repo via a PAT),
# It's A Rock publishes the APK as a Release in THIS repo using the built-in
# GITHUB_TOKEN. No RELEASE_REPO_TOKEN is needed. The version-bump commit is
# pushed to main over SSH via the RELEASE_DEPLOY_KEY secret (a write deploy key
# with a bypass on the "Protect main" ruleset), since GITHUB_TOKEN can't push
# past the required-PR rule.
name: CI / Release

run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
    && format('Release {0} — @{1}', github.event.inputs.version, github.actor)
    || format('CI — {0}', github.ref_name) }}

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'changelogs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'changelogs/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Base version to release, e.g. v0.1.9. A unix-time suffix is appended automatically; dispatch the same version again to re-release it.'
        required: true

# ─── Jobs ─────────────────────────────────────────────────────────────────────

jobs:
  # ---------------------------------------------------------------------------
  # Always runs: typecheck + unit tests
  # ---------------------------------------------------------------------------
  test:
    name: Run tests
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

  # ---------------------------------------------------------------------------
  # Manual dispatch only: resolve version from input, bump app.json, create tag
  # ---------------------------------------------------------------------------
  create-tag:
    name: Validate & create release tag
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version:           ${{ steps.resolve.outputs.version }}
      version_code:      ${{ steps.resolve.outputs.version_code }}
      release_tag:       ${{ steps.resolve.outputs.release_tag }}
      checkout_ref:      ${{ steps.resolve.outputs.checkout_ref }}
      changelog_version: ${{ steps.resolve.outputs.changelog_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Push over SSH as the release deploy key, which has a bypass on the
          # "Protect main" ruleset — the default GITHUB_TOKEN cannot push to main.
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: Resolve version
        id: resolve
        run: |
          INPUT="${{ github.event.inputs.version }}"
          # Base version: strip a leading "v" and any prior build suffix
          # ("-<digits>" or the legacy "-rerelease"), so dispatching either the
          # base ("v1.5.3") or a previously suffixed tag resolves to the same base.
          BARE_BASE="$(echo "$INPUT" | sed -E 's/^v//; s/-([0-9]+|rerelease)$//')"
          EPOCH="$(date +%s)"
          FULL="${BARE_BASE}-${EPOCH}"   # app version string, e.g. 1.5.3-1751999999

          # A unix-time suffix makes every release unique and monotonic, so the
          # same base version can be re-released and the app treats it as newer.
          # The versionCode is the epoch too (fits a 32-bit int until Jan 2038).
          # changelog_version keys the (base-only) changelog file.
          echo "changelog_version=v${BARE_BASE}" >> "$GITHUB_OUTPUT"
          echo "version=${FULL}"                 >> "$GITHUB_OUTPUT"
          echo "version_code=${EPOCH}"           >> "$GITHUB_OUTPUT"
          echo "release_tag=v${FULL}"            >> "$GITHUB_OUTPUT"
          echo "checkout_ref=v${FULL}"           >> "$GITHUB_OUTPUT"
          echo "Releasing v${FULL} (changelog v${BARE_BASE}, versionCode ${EPOCH})"

      - name: Require matching changelog
        run: |
          # Fail fast — before any tag is created — if the base version has no
          # changelog. The filename matches the base version including the leading
          # "v" (e.g. changelogs/v1.0.0.md); the time suffix is not part of it.
          # Catches typos like "v0.50" (only changelogs/v0.5.0.md exists).
          VERSION="${{ steps.resolve.outputs.changelog_version }}"
          FILE="changelogs/${VERSION}.md"
          if [ ! -f "$FILE" ]; then
            echo "::error::Missing ${FILE}. Create a changelog whose filename matches the base release version including the leading 'v' (e.g. changelogs/v1.0.0.md) and commit it to main before releasing."
            exit 1
          fi
          echo "Found changelog ${FILE}"

      - name: Bump app.json version and create tag
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"           # e.g. 1.5.3-1751999999
          VERSION_CODE="${{ steps.resolve.outputs.version_code }}" # the epoch
          TAG="${{ steps.resolve.outputs.release_tag }}"           # e.g. v1.5.3-1751999999

          # Commit the version + versionCode into app.json so the *tag* carries
          # the real values (external builders like F-Droid build from the tag)
          # and push the same commit to the branch, so main always reflects the
          # latest released version.
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = '${VERSION}';
            app.expo.android = {
              ...(app.expo.android || {}),
              versionCode: ${VERSION_CODE},
            };
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.json
          git commit -m "chore(release): ${TAG} [skip ci]"

          # Push the bump to the branch first: if main moved since checkout the
          # push is rejected and we fail here, before any tag is created.
          git push origin "HEAD:${GITHUB_REF_NAME}"

          # The epoch suffix makes each tag unique, so there is no tag to replace.
          git tag "${TAG}"
          git push origin "${TAG}"
          echo "Pushed version bump to ${GITHUB_REF_NAME} and tag ${TAG} (version ${VERSION}, versionCode ${VERSION_CODE})"

  # ---------------------------------------------------------------------------
  # Manual dispatch only: build APK and publish release (runs after create-tag)
  # ---------------------------------------------------------------------------
  build-release:
    name: Build & publish release APK
    if: github.event_name == 'workflow_dispatch'
    needs: create-tag
    runs-on: ubuntu-latest
    env:
      CI: true
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.create-tag.outputs.checkout_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Set app.json version for build
        run: |
          # Belt-and-suspenders: the tag created above already carries the bump,
          # but injecting version + versionCode here too is harmless and keeps the
          # build correct even if the checked-out ref somehow lacks it.
          VERSION="${{ needs.create-tag.outputs.version }}"
          VERSION_CODE="${{ needs.create-tag.outputs.version_code }}"
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = '${VERSION}';
            app.expo.android = {
              ...(app.expo.android || {}),
              versionCode: ${VERSION_CODE},
            };
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "
          echo "Set app.json version to ${VERSION} (versionCode ${VERSION_CODE})"

      - name: Cache Expo prebuild
        uses: actions/cache@v4
        id: prebuild-cache
        with:
          path: android
          key: expo-prebuild-${{ runner.os }}-${{ hashFiles('package-lock.json', 'app.json', 'app.config.*', 'plugins/**') }}

      - name: Generate Android project
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --non-interactive

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: android
          cache-read-only: false

      - name: Write release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ needs.create-tag.outputs.release_tag }}
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Compose release notes
        run: |
          # create-tag already guaranteed the base-version changelog exists, so
          # use it directly (no bare-name or minimal-note fallback). The link
          # pins the file at the release tag, which carries the bump commit.
          CHANGELOG_VERSION="${{ needs.create-tag.outputs.changelog_version }}"
          RELEASE_TAG="${{ needs.create-tag.outputs.release_tag }}"
          REPO="${{ github.repository }}"
          CHANGELOG="changelogs/${CHANGELOG_VERSION}.md"
          if [ ! -f "$CHANGELOG" ]; then
            echo "::error::Missing ${CHANGELOG} at the build ref."
            exit 1
          fi
          LINK="**Changelog:** [${CHANGELOG}](https://github.com/${REPO}/blob/${RELEASE_TAG}/${CHANGELOG})"
          printf '%s\n' "$LINK" > /tmp/release-notes.md

      - name: Publish release to its-a-rock
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-tag.outputs.release_tag }}
          name: ${{ needs.create-tag.outputs.release_tag }}
          body_path: /tmp/release-notes.md
          files: android/app/build/outputs/apk/release/app-release.apk

      - name: Trim build outputs from prebuild cache
        if: always()
        run: rm -rf android/app/build
