# F-Droid build recipe for It's A Rock.
#
# This is a TEMPLATE copy of the metadata file that ultimately lives in the
# fdroiddata repository as metadata/com.itsarock.app.yml. Keeping it here lets
# the recipe evolve alongside the app. See docs/fdroid.md for the full workflow.
#
# The app is an Expo (bare-workflow-on-demand) React Native project: the native
# android/ folder is generated by `expo prebuild`, so the build runs prebuild
# before Gradle. The updater is stripped with EXPO_PUBLIC_ENABLE_INAPP_UPDATES=false
# (see src/constants/features.ts + app.config.js), so no NonFreeNet / self-update
# anti-feature applies.

Categories:
  - Sports & Health
License: MIT
AuthorName: Rajwal Gautam
SourceCode: https://github.com/rajwalgautam/its-a-rock
IssueTracker: https://github.com/rajwalgautam/its-a-rock/issues
Changelog: https://github.com/rajwalgautam/its-a-rock/releases

RepoType: git
Repo: https://github.com/rajwalgautam/its-a-rock.git

Builds:
  # PLACEHOLDER: point this at the first tag cut after the epoch-suffix release
  # scheme landed (tag/versionName look like v1.5.4-1751999999 and versionCode
  # is the epoch, committed onto the tag by the release workflow). Earlier tags
  # were built with versionCode 1 or MAJOR*10000+MINOR*100+PATCH codes; do not
  # use them. See docs/fdroid.md.
  - versionName: X.Y.Z-EPOCH
    versionCode: EPOCH
    commit: vX.Y.Z-EPOCH
    sudo:
      - apt-get update
      - apt-get install -y nodejs npm
    init:
      - npm ci
    prebuild:
      - EXPO_PUBLIC_ENABLE_INAPP_UPDATES=false npx expo prebuild -p android --no-install
    subdir: android
    gradle:
      - yes
    output: android/app/build/outputs/apk/release/app-release.apk

AutoUpdateMode: Version v%v
# Release tags carry a unix-time build suffix, e.g. v1.5.4-1751999999.
UpdateCheckMode: Tags ^v[0-9]+\.[0-9]+\.[0-9]+-[0-9]+$
CurrentVersion: X.Y.Z-EPOCH
CurrentVersionCode: EPOCH
